<html>
    <head>
        <title id="title">Books</title>
        <style>
            html { font-size: 62.5%; }
            /* Loading spinner */
            .loading-spinner {
                border: 2px solid #f3f3f3;
                border-top: 2px solid #3498db;
                border-radius: 50%;
                width: 16px;
                height: 16px;
                animation: spin 1s linear infinite;
            }
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
            /* Error message */
            .error-message {
                color: #d32f2f;
                padding: 1em;
                background-color: #ffebee;
                border-radius: 4px;
                margin: 1em 0;
            }
            /* Dark mode support */
            body {
                background-color: var(--bg, white);
                color: var(--color, black);
            }
            body.dark-mode {
                --bg: #1a1a1a;
                --color: #e0e0e0;
                --link-color: #64b5f6;
                --link-hover-color: #42a5f5;
                --h-bg: #2d2d2d;
                --hr-color: #616161;
            }
            body.dark-mode .topheader {
                background-color: #2d2d2d;
            }
            body.dark-mode .error-message {
                background-color: #2d1b1b;
                color: #ef9a9a;
            }
            body.dark-mode a {
                color: #64b5f6;
            }
            body.dark-mode a:visited {
                color: #ab47bc;
            }
            body.dark-mode #search-input {
                background-color: #424242;
                color: #e0e0e0;
                border-color: #616161;
            }
            /* Override link colors in loaded content (for FB2 HTML books)
             * Use !important to override fb2.xsl styles (A { color: ... })
             * Also override hover/active states
             */
            #content a,
            #content a:visited,
            #content a:active {
                color: var(--link-color, #0002CC) !important;
            }
            #content a:hover {
                color: var(--link-hover-color, #BF0000) !important;
            }
            .topheader {
                display: flex;
                justify-content: space-between;
                align-items: center;
                position: sticky;
                top: 0;
                left: 0;
                right: 0;
                height: 1.5em;
                z-index: 1001;
                padding-left: 0.5em;
                padding-right: 0.5em;
                background-color: inherit;
            }
            .rowlist {
                display: grid;
                align-items: flex-start;
                margin-left: 1em;
                flex-wrap: wrap; /* Enable wrapping if needed */
                grid-template-columns: minmax(30%, auto) minmax(auto, auto);
            }

            .col1 {
                text-align: left;
                width: auto;
                max-width: none; /* Allow columns to grow based on content */
                min-width: 30%; /* Min width of the first column */
                box-sizing: border-box;
            }
            .col2{
                text-align: left;
                width: auto;
                max-width: none; /* Allow columns to grow based on content */
                box-sizing: border-box;
            }
            @media (max-width: 400px) {
                html { font-size: 200%; }
                .rowlist {
                    display: block; /* Change to a single column layout */
                    margin-left: 0.5em;
                }
                .col1, .col2 {
                    width: 100%;
                }
                .topheader {
                    position: relative;
                }
            }

            @media (min-width: 401px) and (max-width: 700px) {
                html { font-size: 235%; } /* Adjusted for small mobile devices */
                .col1, .col2 {
                    text-align: left;
                    width: auto; /* Adapt width to content */
                    max-width: 90%;
                }
            }

            @media (min-width: 701px) and (max-width: 992px) {
                html { font-size: 200%; } /* Adjusted for medium devices */
                .col1, .col2 {
                    text-align: left;
                    width: auto; /* Adapt width to content */
                    max-width: 90%;
                }
            }

            @media (min-width: 993px) and (max-width: 1200px) {
                html { font-size: 200%; } /* Adjusted for tablets */
                .col1, .col2 {
                    text-align: left;
                    width: auto; /* Adapt width to content */
                    max-width: 90%;
                }
            }

            @media (min-width: 1201px) {
                html { font-size: 100%; } /* Laptops/Desktops */
                .col1, .col2 {
                    text-align: left;
                    width: auto; /* Adapt width to content */
                    max-width: 90%;
                }
            }

            .author_info, .book_info {
                margin-left: 2em;
            }
            /* Width limit for book content only */
            .book-content {
                max-width: 90%;
                margin-left: auto;
                margin-right: auto;
            }

            @media (min-width: 1201px) and (max-width: 1920px) {
                .book-content {
                    max-width: 900px;
                }
            }

            @media (min-width: 1921px) and (max-width: 2560px) {
                .book-content {
                    max-width: 1200px;
                }
            }

            @media (min-width: 2561px) {
                .book-content {
                    max-width: 1600px;
                }
            }
            /* Header right section */
            .header-right-section {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            /* Search input styling */
            #search-input {
                width: 150px;
                padding: 2px 6px;
                font-size: 1em;
                border: 1px solid #ccc;
                border-radius: 3px;
            }
            #search-section button {
                padding: 2px 8px;
                font-size: 1em;
                cursor: pointer;
            }
        </style>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>
    <body>
        <div class="topheader">
            <div id="navigation-section" class="navi"></div>
            <div class="header-right-section">
                <div class="loading-container">
                    <div id="loading-indicator" class="loading-spinner" style="display: none;"></div>
                </div>
                <div id="search-section" class="search-section">
                    <input type="text" id="search-input" placeholder="Поиск...">
                    <button onclick="performSearch()">Поиск</button>
                </div>
                <div class="theme-toggle">
                    <button id="theme-btn" title="Переключить тему (🌙/☀️)">🌙</button>
                </div>
            </div>
        </div>
        <h1 id="title">Books</h1>
        <hr>
        <div id="content"></div>

        <script src="{{ data["approot"] }}/interface.js"></script>
    </body>
</html>
